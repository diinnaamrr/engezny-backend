# docker-compose.prod.env-only.yml
# هذه النسخة تستخدم فقط environment variables
# لا تحتاج ملف .env على السيرفر
# القيم الافتراضية بعد :- يمكن تجاوزها بالـ CI/CD Secrets

services:
  app:
    image: ghcr.io/diinnaamrr/engezny-backend:${IMAGE_TAG:-latest}
    container_name: engezny_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - engezny-network
    depends_on:
      - db
      - redis
    environment:
      # Laravel App
      - APP_NAME=${APP_NAME:-Nemotours}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}                     # يجب تحديده في CI/CD Secrets
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-https://nemotours-hn.com}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-nemotours_db}
      - DB_USERNAME=${DB_USERNAME:-nemotours}
      - DB_PASSWORD=${DB_PASSWORD:-nemotours123}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-null}
      - REDIS_PORT=6379
      
      # Cache & Session
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      
      # Mail
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-mailhog}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_USERNAME=${MAIL_USERNAME:-null}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-null}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-no-reply@nemotours-hn.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Nemotours}

      # Pusher
      - PUSHER_APP_ID=${PUSHER_APP_ID:-nemotours}
      - PUSHER_APP_KEY=${PUSHER_APP_KEY:-nemotours}
      - PUSHER_APP_SECRET=${PUSHER_APP_SECRET:-nemotours}
      - PUSHER_HOST=${PUSHER_HOST:-nemotours-hn.com}
      - PUSHER_PORT=${PUSHER_PORT:-6015}
      - PUSHER_SCHEME=${PUSHER_SCHEME:-https}

      # Reverb (WebSockets)
      - REVERB_APP_ID=${REVERB_APP_ID:-nemotours}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-nemotours}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-nemotours}
      - REVERB_HOST=${REVERB_HOST:-nemotours-hn.com}
      - REVERB_PORT=${REVERB_PORT:-6015}
      - REVERB_SCHEME=${REVERB_SCHEME:-https}

  nginx:
    image: nginx:alpine
    container_name: engezny_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - engezny-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: engezny_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nemotours_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}    # يجب تحديده في CI/CD Secrets
      MYSQL_PASSWORD: ${DB_PASSWORD:-nemotours123}
      MYSQL_USER: ${DB_USERNAME:-nemotours}
    volumes:
      - engezny_dbdata:/var/lib/mysql
      - ./backups:/backups
    networks:
      - engezny-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: engezny_redis
    restart: unless-stopped
    volumes:
      - engezny_redisdata:/data
    networks:
      - engezny-network
    command: redis-server --appendonly yes

networks:
  engezny-network:
    driver: bridge

volumes:
  engezny_dbdata:
    driver: local
  engezny_redisdata:
    driver: local
