services:
  app:
    image: ghcr.io/osama21245/wayak-back:${IMAGE_TAG:-latest}
    container_name: wayak_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - wayak-network
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:alpine
    container_name: wayak_nginx
    restart: unless-stopped
    ports:
      - "8111:80"  # Changed to 8111 for CloudPanel reverse proxy
      # - "443:443"  # Commented out - SSL handled by CloudPanel Nginx
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - wayak-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: wayak_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-wayak_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-wayak_user}
    volumes:
      - dbdata:/var/lib/mysql
      - ./backups:/backups
    networks:
      - wayak-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: wayak_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - wayak-network
    command: redis-server --appendonly yes

networks:
  wayak-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local

