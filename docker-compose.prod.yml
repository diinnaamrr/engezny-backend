version: "3.9"

services:
  app:
    image: ghcr.io/fassla-software/nemo-tours-backend:latest
    container_name: nemotours_app_prod
    restart: unless-stopped
    working_dir: /var/www/html

    volumes:
      - storage_data:/var/www/html/storage
      - cache_data:/var/www/html/bootstrap/cache

    env_file:
      - .env

    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - db
      - redis

    networks:
      - nemotours-prod-network

  nginx:
    image: nginx:alpine
    container_name: nemotours_nginx_prod
    restart: unless-stopped
    ports:
      - "8015:80"

    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro

    depends_on:
      - app

    networks:
      - nemotours-prod-network

  db:
    image: mysql:8.0
    container_name: nemotours_db_prod
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    volumes:
      - nemotours_dbdata_prod:/var/lib/mysql

    command: --default-authentication-plugin=mysql_native_password

    networks:
      - nemotours-prod-network

  redis:
    image: redis:7-alpine
    container_name: nemotours_redis_prod
    restart: unless-stopped

    volumes:
      - nemotours_redisdata_prod:/data

    command: redis-server --appendonly yes

    networks:
      - nemotours-prod-network

networks:
  nemotours-prod-network:
    driver: bridge

volumes:
  nemotours_dbdata_prod:
  nemotours_redisdata_prod:
  storage_data:
  cache_data:
