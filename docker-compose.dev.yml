services:
  app:
    build: .
    image: engezny-backend:${IMAGE_TAG:-dev}
    container_name: engezny_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - engezny-dev-network
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:alpine
    container_name: engezny_nginx_dev
    restart: unless-stopped
    ports:
      - "8019:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default-dev.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - engezny-dev-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: engezny_db_dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-engezny_db_dev}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-engezny}
    volumes:
      - engezny_dbdata_dev:/var/lib/mysql
    networks:
      - engezny-dev-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: engezny_redis_dev
    restart: unless-stopped
    volumes:
      - engezny_redisdata_dev:/data
    networks:
      - engezny-dev-network

networks:
  engezny-dev-network:
    driver: bridge

volumes:
  engezny_dbdata_dev:
    driver: local
  engezny_redisdata_dev:
    driver: local
