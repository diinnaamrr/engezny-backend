# CloudPanel Nginx Configuration for nemotours.duckdns.org
# Place this file in: /etc/nginx/sites-available/nemotours.duckdns.org
# Then enable it: sudo ln -s /etc/nginx/sites-available/nemotours.duckdns.org /etc/nginx/sites-enabled/

# HTTP Server - Proxy to Docker container on port 8016
server {
    listen 80;
    listen [::]:80;
    server_name nemotours.duckdns.org;

    # Let's Encrypt challenge (for SSL certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy all requests to Docker container
    location / {
        proxy_pass http://127.0.0.1:8016;
        
        # Essential proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support (if your app uses WebSockets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings (disable buffering for real-time responses)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Logging
    access_log /var/log/nginx/nemotours-access.log;
    error_log /var/log/nginx/nemotours-error.log;
}

