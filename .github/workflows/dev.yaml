name: Dev Deploy - Nemo Tours

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: fassla-software
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fassla-software/nemo-tours-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=dev-
            type=raw,value=dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH to server & deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e

            cd /var/www/nemo-tours-backend

            mkdir -p docker/nginx storage bootstrap/cache

            rm -f docker/nginx/default.conf

            cat > docker/nginx/default.conf << 'EOF'
            server {
                listen 80;
                server_name nemotours.duckdns.org;

                root /var/www/html/public;
                index index.php;

                client_max_body_size 100M;

                location / {
                    try_files $uri $uri/ /index.php?$query_string;
                }

                location ~ \.php$ {
                    fastcgi_pass app:9000;
                    fastcgi_index index.php;
                    fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
                    include fastcgi_params;
                }

                location ~ /\.(?!well-known).* {
                    deny all;
                }
            }
            EOF

            docker-compose -f docker-compose.dev.yml pull
            docker-compose -f docker-compose.dev.yml down
            docker-compose -f docker-compose.dev.yml up -d

            DEV_URL="https://nemotours.duckdns.org"

            cp .env .env.backup || true

            if grep -q "^APP_URL=" .env; then
              sed -i "s|^APP_URL=.*|APP_URL=${DEV_URL}|" .env
            else
              echo "APP_URL=${DEV_URL}" >> .env
            fi

            if grep -q "^ASSET_URL=" .env; then
              sed -i "s|^ASSET_URL=.*|ASSET_URL=${DEV_URL}|" .env
            else
              echo "ASSET_URL=${DEV_URL}" >> .env
            fi

            docker-compose -f docker-compose.dev.yml exec -T app php artisan key:generate || true
            docker-compose -f docker-compose.dev.yml exec -T app php artisan storage:link || true
            docker-compose -f docker-compose.dev.yml exec -T app php artisan config:clear || true
            docker-compose -f docker-compose.dev.yml exec -T app php artisan cache:clear || true
            docker-compose -f docker-compose.dev.yml exec -T app php artisan view:clear || true
            docker-compose -f docker-compose.dev.yml exec -T app php artisan route:clear || true
