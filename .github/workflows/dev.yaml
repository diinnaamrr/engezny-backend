name: Dev Deploy - Engezny

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: diinnaamrr
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/diinnaamrr/engezny-backend:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on Dev Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /var/www

            if [ ! -d "engezny-dev/.git" ]; then
              git clone -b dev https://github.com/diinnaamrr/engezny-backend.git engezny-dev
            fi

            cd engezny-dev
            git pull origin dev

            docker login ghcr.io -u diinnaamrr -p ${{ secrets.GHCR_PAT }}

            docker-compose -f docker-compose.dev.yml pull
            docker-compose -f docker-compose.dev.yml down
            docker-compose -f docker-compose.dev.yml up -d

            # Wait for container to be ready
            sleep 5

            # Sync public files (images, CSS, JS) from Docker image to host
            echo "🔄 Syncing public files from image to host..."
            mkdir -p /var/www/engezny-dev/public/landing-page/assets
            docker cp engezny_app_dev:/var/www/html/public/landing-page/assets/. /var/www/engezny-dev/public/landing-page/assets/ 2>/dev/null || echo "⚠️  Some files may not have been copied"
            
            # Set proper permissions
            chown -R www-data:www-data /var/www/engezny-dev/public 2>/dev/null || chmod -R 755 /var/www/engezny-dev/public
            
            echo "✅ Deployment complete! Public files synced."

            docker image prune -f
