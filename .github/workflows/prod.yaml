name: Prod Deploy - Nemo Tours

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: fassla-software
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/fassla-software/nemo-tours-backend:latest
          no-cache: true 

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /var/www/nemo-tours-prod

            # Pull latest code from GitHub
            git fetch origin || true
            git pull origin master || git pull origin main || true

            docker login ghcr.io -u fassla-software -p ${{ secrets.GITHUB_TOKEN }}

            docker compose -f docker-compose.prod.yml pull
            
            # Copy missing resources files from image to host BEFORE starting containers
            # This ensures files are available when volume mount happens
            echo "📁 Copying resources files from image to host..."
            TEMP_CONTAINER=$(docker create ghcr.io/fassla-software/nemo-tours-backend:latest 2>/dev/null || echo "")
            if [ -n "$TEMP_CONTAINER" ]; then
              # Ensure resources directory exists
              mkdir -p ./resources/views/landing-page/sections
              # Copy resources files from image
              docker cp "$TEMP_CONTAINER:/var/www/html/resources/." ./resources/ 2>/dev/null || true
              docker rm "$TEMP_CONTAINER" 2>/dev/null || true
              echo "✅ Resources files synced from image!"
            else
              echo "⚠️  Could not create temp container, files may be missing"
            fi
            
            # Stop containers before updating
            docker compose -f docker-compose.prod.yml down || true
            
            # Start containers (volume mount will now have the files)
            docker compose -f docker-compose.prod.yml up -d

            # Wait for container to be ready
            sleep 5

            docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force || true
            docker compose -f docker-compose.prod.yml exec -T app php artisan optimize:clear || true
