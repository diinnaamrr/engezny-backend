services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engezny_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - engezny-network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: engezny_nginx
    restart: unless-stopped
    ports:
      - "8016:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - engezny-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: engezny_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-engezny_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-engeznyroot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-engezny123}
      MYSQL_USER: ${DB_USERNAME:-engezny}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - engezny_dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - engezny-network

  redis:
    image: redis:7-alpine
    container_name: engezny_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - engezny_redisdata:/data
    networks:
      - engezny-network

  node:
    image: node:18-alpine
    container_name: engezny_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run watch"
    networks:
      - engezny-network
    depends_on:
      - app
    profiles:
      - dev

networks:
  engezny-network:
    driver: bridge

volumes:
  engezny_dbdata:
    driver: local
  engezny_redisdata:
    driver: local
