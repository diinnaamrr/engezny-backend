services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nemotours_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - nemotours-network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: nemotours_nginx
    restart: unless-stopped
    ports:
      - "8016:80"   # غيرت البورت عشان ما يتعارضش
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nemotours-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: nemotours_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nemotours_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-nemotoursroot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nemotours123}
      MYSQL_USER: ${DB_USERNAME:-nemotours}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - nemotours_dbdata:/var/lib/mysql
    ports:
      - "3307:3306"   # غيرت البورت عشان ما يتعارضش مع أي mysql ثاني
    networks:
      - nemotours-network

  redis:
    image: redis:7-alpine
    container_name: nemotours_redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # لتفادي أي تعارض
    volumes:
      - nemotours_redisdata:/data
    networks:
      - nemotours-network

  node:
    image: node:18-alpine
    container_name: nemotours_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run watch"
    networks:
      - nemotours-network
    depends_on:
      - app
    profiles:
      - dev

networks:
  nemotours-network:
    driver: bridge

volumes:
  nemotours_dbdata:
    driver: local
  nemotours_redisdata:
    driver: local
