services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: engezny_app_local
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - engezny-local-network
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:alpine
    container_name: engezny_nginx_local
    restart: unless-stopped
    ports:
      - "8017:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default-local.conf:/etc/nginx/conf.d/default.conf
    networks:
      - engezny-local-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: engezny_db_local
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-engezny_db_local}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD:-engeznyroot}}
      MYSQL_PASSWORD: ${DB_PASSWORD:-engezny123}
      MYSQL_USER: ${DB_USERNAME:-engezny}
    volumes:
      - engezny_dbdata_local:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - engezny-local-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: engezny_redis_local
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - engezny_redisdata_local:/data
    networks:
      - engezny-local-network

networks:
  engezny-local-network:
    driver: bridge

volumes:
  engezny_dbdata_local:
    driver: local
  engezny_redisdata_local:
    driver: local
